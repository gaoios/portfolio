<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Coding 厂商内容策略与产品节奏对比</title>
    <meta name="description" content="Trae AI、Qoder、Kimi、MiniMax、智谱AI 五大AI编程平台公众号内容发布策略时间轴对比分析">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --trae-primary: #00D4AA;
            --trae-secondary: #00B894;
            --trae-glow: rgba(0, 212, 170, 0.3);
            --qoder-primary: #8B5CF6;
            --qoder-secondary: #7C3AED;
            --qoder-glow: rgba(139, 92, 246, 0.3);
            --kimi-primary: #FF6B6B;
            --kimi-secondary: #EE5A5A;
            --kimi-glow: rgba(255, 107, 107, 0.3);
            --minimax-primary: #4ECDC4;
            --minimax-secondary: #45B7AA;
            --minimax-glow: rgba(78, 205, 196, 0.3);
            --zhipu-primary: #FFB347;
            --zhipu-secondary: #FFA726;
            --zhipu-glow: rgba(255, 179, 71, 0.3);
            --bg-dark: #0F0F1A;
            --bg-card: #1A1A2E;
            --bg-surface: #16213E;
            --text-primary: #E8E8E8;
            --text-secondary: #A0A0A0;
            --border-color: rgba(255, 255, 255, 0.08);
            --cat-product: #FF6B6B;
            --cat-activity: #4ECDC4;
            --cat-case: #45B7D1;
            --cat-tech: #96CEB4;
            --cat-insight: #DDA0DD;
            --cat-content: #98D8C8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            padding: 30px 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 800px;
            height: 400px;
            background: radial-gradient(ellipse, rgba(139, 92, 246, 0.15) 0%, transparent 50%), radial-gradient(ellipse at 30% 50%, var(--trae-glow) 0%, transparent 40%), radial-gradient(ellipse at 70% 50%, var(--kimi-glow) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--trae-primary) 0%, var(--qoder-primary) 50%, var(--kimi-primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .subtitle {
            font-size: 16px;
            color: var(--text-secondary);
            position: relative;
            z-index: 1;
        }

        /* Stats Grid - 5列 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 16px;
            margin-bottom: 35px;
        }

        @media (max-width: 1200px) {
            .stats-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .platform-stats {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 18px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .platform-stats:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 35px rgba(0, 0, 0, 0.4);
        }

        .platform-stats::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
        }

        .platform-stats.trae::before {
            background: linear-gradient(90deg, var(--trae-primary), var(--trae-secondary));
        }

        .platform-stats.qoder::before {
            background: linear-gradient(90deg, var(--qoder-primary), var(--qoder-secondary));
        }

        .platform-stats.kimi::before {
            background: linear-gradient(90deg, var(--kimi-primary), var(--kimi-secondary));
        }

        .platform-stats.minimax::before {
            background: linear-gradient(90deg, var(--minimax-primary), var(--minimax-secondary));
        }

        .platform-stats.zhipu::before {
            background: linear-gradient(90deg, var(--zhipu-primary), var(--zhipu-secondary));
        }

        .platform-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .platform-logo {
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .platform-logo.trae {
            background: linear-gradient(135deg, var(--trae-primary), var(--trae-secondary));
            color: #000;
        }

        .platform-logo.qoder {
            background: linear-gradient(135deg, var(--qoder-primary), var(--qoder-secondary));
            color: #fff;
        }

        .platform-logo.kimi {
            background: linear-gradient(135deg, var(--kimi-primary), var(--kimi-secondary));
            color: #fff;
        }

        .platform-logo.minimax {
            background: linear-gradient(135deg, var(--minimax-primary), var(--minimax-secondary));
            color: #000;
        }

        .platform-logo.zhipu {
            background: linear-gradient(135deg, var(--zhipu-primary), var(--zhipu-secondary));
            color: #000;
        }

        .platform-name {
            font-size: 16px;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .platform-name.trae {
            color: var(--trae-primary);
        }

        .platform-name.qoder {
            color: var(--qoder-primary);
        }

        .platform-name.kimi {
            color: var(--kimi-primary);
        }

        .platform-name.minimax {
            color: var(--minimax-primary);
        }

        .platform-name.zhipu {
            color: var(--zhipu-primary);
        }

        .stat-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }

        .stat-item {
            background: var(--bg-surface);
            padding: 10px 12px;
            border-radius: 8px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-label {
            font-size: 10px;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        /* Controls */
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 18px;
            background: var(--bg-card);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .control-group label {
            font-size: 14px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .control-group select {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--bg-surface);
            color: var(--text-primary);
            font-size: 14px;
            min-width: 140px;
            cursor: pointer;
        }

        .control-group select:focus {
            outline: none;
            border-color: var(--trae-primary);
        }

        .platform-toggles {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .platform-toggle {
            padding: 6px 12px;
            border: 2px solid var(--border-color);
            border-radius: 18px;
            background: transparent;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .platform-toggle .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .platform-toggle.active {
            color: white;
        }

        .platform-toggle.trae.active {
            background: var(--trae-primary);
            border-color: var(--trae-primary);
            color: #000;
        }

        .platform-toggle.qoder.active {
            background: var(--qoder-primary);
            border-color: var(--qoder-primary);
        }

        .platform-toggle.kimi.active {
            background: var(--kimi-primary);
            border-color: var(--kimi-primary);
        }

        .platform-toggle.minimax.active {
            background: var(--minimax-primary);
            border-color: var(--minimax-primary);
            color: #000;
        }

        .platform-toggle.zhipu.active {
            background: var(--zhipu-primary);
            border-color: var(--zhipu-primary);
            color: #000;
        }

        .platform-toggle:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }

        /* Legend */
        .legend {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 25px;
            padding: 12px 20px;
            background: var(--bg-card);
            border-radius: 10px;
            border: 1px solid var(--border-color);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 8px;
            border-radius: 5px;
        }

        .legend-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .legend-item.inactive {
            opacity: 0.35;
        }

        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 3px;
        }

        /* Timeline */
        .timeline-wrapper {
            position: relative;
            width: 100%;
            margin: 0 auto;
            padding: 20px 40px 60px 140px;
            min-height: 500px;
        }

        @media (max-width: 768px) {
            .timeline-wrapper {
                padding-left: 90px;
            }
        }

        .time-scale {
            position: relative;
            height: 50px;
            margin-bottom: 20px;
            border-bottom: 2px solid var(--border-color);
        }

        .time-marker {
            position: absolute;
            width: 1px;
            height: 15px;
            background: var(--text-secondary);
            bottom: 0;
        }

        .time-label {
            position: absolute;
            bottom: 22px;
            font-size: 11px;
            color: var(--text-secondary);
            transform: translateX(-50%);
            white-space: nowrap;
        }

        .swimlanes-container {
            position: relative;
        }

        .swimlane {
            position: relative;
            min-height: 65px;
            margin-bottom: 10px;
            border-radius: 10px;
            padding: 10px 0;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
        }

        .swimlane-label {
            position: absolute;
            left: -130px;
            width: 120px;
            font-size: 11px;
            font-weight: 600;
            text-align: right;
            padding-right: 12px;
            color: var(--text-secondary);
            top: 50%;
            transform: translateY(-50%);
        }

        @media (max-width: 768px) {
            .swimlane-label {
                left: -85px;
                width: 75px;
                font-size: 10px;
            }
        }

        .swimlane-label .count {
            display: block;
            font-size: 10px;
            font-weight: 400;
            opacity: 0.7;
            margin-top: 2px;
        }

        .swimlane-content {
            position: relative;
            width: 100%;
            min-height: 45px;
        }

        /* Events */
        .event-item {
            position: absolute;
            z-index: 10;
        }

        .event-bubble {
            padding: 4px 7px;
            border-radius: 5px;
            font-size: 9px;
            line-height: 1.3;
            min-width: 70px;
            max-width: 160px;
            position: relative;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            display: block;
        }

        .event-bubble:hover {
            transform: scale(1.1) translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            z-index: 100;
            white-space: normal;
            max-width: 300px;
        }

        .event-bubble.trae {
            background: linear-gradient(135deg, var(--trae-primary), var(--trae-secondary));
            color: #000;
        }

        .event-bubble.qoder {
            background: linear-gradient(135deg, var(--qoder-primary), var(--qoder-secondary));
            color: #fff;
        }

        .event-bubble.kimi {
            background: linear-gradient(135deg, var(--kimi-primary), var(--kimi-secondary));
            color: #fff;
        }

        .event-bubble.minimax {
            background: linear-gradient(135deg, var(--minimax-primary), var(--minimax-secondary));
            color: #000;
        }

        .event-bubble.zhipu {
            background: linear-gradient(135deg, var(--zhipu-primary), var(--zhipu-secondary));
            color: #000;
        }

        .event-title {
            font-weight: 600;
            font-size: 9px;
            display: block;
            line-height: 1.2;
        }

        .event-date {
            font-size: 8px;
            opacity: 0.8;
            display: block;
            margin-top: 2px;
        }

        .category-tag {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 5px;
            height: 5px;
            border-radius: 2px;
        }

        .link-icon {
            position: absolute;
            bottom: 2px;
            right: 2px;
            font-size: 7px;
            opacity: 0.6;
        }

        .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255, 255, 255, 0.03);
            z-index: 1;
        }

        /* Platform Group Styles */
        .platform-group {
            margin-bottom: 20px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
        }

        .platform-group-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            font-weight: 600;
            font-size: 14px;
            border-bottom: 1px solid var(--border-color);
        }

        .platform-group-header.trae {
            background: linear-gradient(90deg, rgba(0, 212, 170, 0.15), transparent);
            border-left: 3px solid var(--trae-primary);
        }

        .platform-group-header.qoder {
            background: linear-gradient(90deg, rgba(138, 43, 226, 0.15), transparent);
            border-left: 3px solid var(--qoder-primary);
        }

        .platform-group-header.kimi {
            background: linear-gradient(90deg, rgba(52, 152, 219, 0.15), transparent);
            border-left: 3px solid var(--kimi-primary);
        }

        .platform-group-header.minimax {
            background: linear-gradient(90deg, rgba(255, 165, 0, 0.15), transparent);
            border-left: 3px solid var(--minimax-primary);
        }

        .platform-group-header.zhipu {
            background: linear-gradient(90deg, rgba(50, 205, 50, 0.15), transparent);
            border-left: 3px solid var(--zhipu-primary);
        }

        .platform-icon {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            font-weight: 700;
        }

        .platform-icon.trae {
            background: linear-gradient(135deg, var(--trae-primary), var(--trae-secondary));
            color: #000;
        }

        .platform-icon.qoder {
            background: linear-gradient(135deg, var(--qoder-primary), var(--qoder-secondary));
            color: #fff;
        }

        .platform-icon.kimi {
            background: linear-gradient(135deg, var(--kimi-primary), var(--kimi-secondary));
            color: #fff;
        }

        .platform-icon.minimax {
            background: linear-gradient(135deg, var(--minimax-primary), var(--minimax-secondary));
            color: #000;
        }

        .platform-icon.zhipu {
            background: linear-gradient(135deg, var(--zhipu-primary), var(--zhipu-secondary));
            color: #000;
        }

        .platform-title {
            color: var(--text-primary);
        }

        .platform-count {
            margin-left: auto;
            font-size: 12px;
            color: var(--text-secondary);
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 10px;
            border-radius: 12px;
        }

        .category-swimlanes {
            padding: 8px 0;
        }

        .category-swimlane {
            position: relative;
            min-height: 36px;
            margin: 4px 0;
            padding: 4px 0 4px 100px;
        }

        .category-swimlane:not(:last-child) {
            border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
        }

        .category-swimlane-label {
            position: absolute;
            left: 12px;
            width: 80px;
            font-size: 10px;
            font-weight: 500;
            color: var(--text-secondary);
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .cat-dot {
            width: 6px;
            height: 6px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        .category-swimlane-label .count {
            margin-left: auto;
            font-size: 9px;
            opacity: 0.6;
            background: rgba(255, 255, 255, 0.08);
            padding: 1px 4px;
            border-radius: 6px;
        }

        .category-swimlane-content {
            position: relative;
            width: 100%;
            min-height: 28px;
        }

        /* Compact Event Styles */
        .event-item.compact {
            position: absolute;
            z-index: 10;
        }

        .event-bubble.compact {
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 8px;
            line-height: 1.2;
            min-width: 50px;
            max-width: 100px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-decoration: none;
            display: block;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: all 0.2s ease;
        }

        .event-bubble.compact:hover {
            transform: scale(1.15) translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
            z-index: 100;
            max-width: 250px;
            white-space: normal;
            min-width: 150px;
        }

        .event-title-compact {
            font-weight: 600;
            font-size: 8px;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(8px);
        }

        .modal-content {
            position: relative;
            margin: 5% auto;
            width: 90%;
            max-width: 600px;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid var(--border-color);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 24px;
            font-weight: 300;
            cursor: pointer;
            color: var(--text-secondary);
            transition: color 0.2s;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-header {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-color);
        }

        .modal-platform {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .modal-platform.trae {
            background: var(--trae-glow);
            color: var(--trae-primary);
        }

        .modal-platform.qoder {
            background: var(--qoder-glow);
            color: var(--qoder-primary);
        }

        .modal-platform.kimi {
            background: var(--kimi-glow);
            color: var(--kimi-primary);
        }

        .modal-platform.minimax {
            background: var(--minimax-glow);
            color: var(--minimax-primary);
        }

        .modal-platform.zhipu {
            background: var(--zhipu-glow);
            color: var(--zhipu-primary);
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 10px;
            line-height: 1.4;
        }

        .modal-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .modal-body {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 18px;
            min-height: 60px;
        }

        .modal-link {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(135deg, var(--trae-primary), var(--qoder-primary));
            color: #000;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .modal-link:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 170, 0.4);
        }

        /* Chart */
        .chart-container {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 30px;
            border: 1px solid var(--border-color);
        }

        .chart-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 18px;
            color: var(--text-primary);
        }

        .chart-wrapper {
            position: relative;
            height: 160px;
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            gap: 3px;
            padding-bottom: 28px;
            overflow-x: auto;

                });
            }

            // 分类筛选
            data = data.filter(item => currentFilters.categories.has(item.category));

            return data.sort((a, b) => new Date(a.publish_time) - new Date(b.publish_time));
        }

        // 弹窗状态标记，防止渲染时关闭弹窗
        let isModalOpen = false;

        // 渲染时间轴
        function renderTimeline() {
            // 如果弹窗打开中，不执行渲染
            if (isModalOpen) return;

            const data = getFilteredData();
            const container = document.getElementById('swimlanesContainer');

            if (data.length === 0) {
                container.innerHTML = '<div class="no-data">没有符合筛选条件的数据</div>';
                document.getElementById('timeScale').innerHTML = '';
                return;
            }

            const startDate = new Date(data[0].publish_time);
            const endDate = new Date(data[data.length - 1].publish_time);
            const duration = endDate - startDate || 1;

            renderTimeScale(startDate, endDate, duration);

            container.innerHTML = '';

            // 添加网格线
            for (let i = 10; i <= 90; i += 10) {
                const gl = document.createElement('div');
                gl.className = 'grid-line';
                gl.style.left = i + '%';
                container.appendChild(gl);
            }

            if (currentFilters.viewMode === 'platform') {
                // 按平台顺序渲染，每个平台下按分类创建子泳道
                PLATFORM_ORDER.forEach(pid => {
                    if (!currentFilters.platforms.has(pid)) return;
                    const pdata = data.filter(x => x.platform === pid);
                    if (pdata.length > 0) {
                        // 创建平台分组容器
                        const platformGroup = createPlatformGroup(pid, pdata, startDate, duration);
                        container.appendChild(platformGroup);
                    }
                });
            } else {
                // 按分类渲染
                CATEGORY_ORDER.forEach(cat => {
                    if (!currentFilters.categories.has(cat)) return;
                    const cdata = data.filter(x => x.category === cat);
                    if (cdata.length > 0) {
                        container.appendChild(createSwimlane(cat, cdata, startDate, duration));
                    }
                });
            }
        }

        // 创建平台分组（包含分类子泳道）
        function createPlatformGroup(pid, items, start, dur) {
            const group = document.createElement('div');
            group.className = 'platform-group ' + pid;

            // 平台标题
            const header = document.createElement('div');
            header.className = 'platform-group-header ' + pid;
            header.innerHTML = `
                <span class="platform-icon ${pid}">${PLATFORMS[pid].short}</span>
                <span class="platform-title">${PLATFORMS[pid].name}</span>
                <span class="platform-count">${items.length}篇</span>
            `;
            group.appendChild(header);

            // 为每个分类创建子泳道
            const swimlanesWrapper = document.createElement('div');
            swimlanesWrapper.className = 'category-swimlanes';

            CATEGORY_ORDER.forEach(cat => {
                if (!currentFilters.categories.has(cat)) return;
                const catData = items.filter(x => x.category === cat);
                if (catData.length > 0) {
                    swimlanesWrapper.appendChild(createCategorySwimlane(cat, catData, start, dur, pid));
                }
            });

            group.appendChild(swimlanesWrapper);
            return group;
        }

        // 创建分类子泳道
        function createCategorySwimlane(cat, items, start, dur, platformId) {
            const sl = document.createElement('div');
            sl.className = 'category-swimlane';

            const lb = document.createElement('div');
            lb.className = 'category-swimlane-label';
            lb.innerHTML = `<span class="cat-dot" style="background:${CAT_COLORS[cat]}"></span>${cat}<span class="count">${items.length}</span>`;
            sl.appendChild(lb);

            const content = document.createElement('div');
            content.className = 'category-swimlane-content';

            // 多行布局算法
            const rows = [];
            const sorted = [...items].sort((a, b) => new Date(a.publish_time) - new Date(b.publish_time));

            sorted.forEach(item => {
                const pos = ((new Date(item.publish_time) - start) / dur) * 100;
                let placed = false;

                for (let i = 0; i < rows.length; i++) {
                    let ok = true;
                    for (const ex of rows[i]) {
                        const ep = ((new Date(ex.publish_time) - start) / dur) * 100;
                        if (Math.abs(pos - ep) < 4) {
                            ok = false;
                            break;
                        }
                    }
                    if (ok) {
                        rows[i].push(item);
                        item.row = i;
                        placed = true;
                        break;
                    }
                }

                if (!placed) {
                    item.row = rows.length;
                    rows.push([item]);
                }
            });

            sl.style.height = Math.max(36, rows.length * 28 + 10) + 'px';

            // 创建事件气泡
            sorted.forEach(item => {
                const pos = ((new Date(item.publish_time) - start) / dur) * 100;

                const ev = document.createElement('div');
                ev.className = 'event-item compact';
                ev.style.left = pos + '%';
                ev.style.top = (4 + item.row * 28) + 'px';

                const bb = document.createElement('a');
                bb.className = 'event-bubble compact ' + platformId;
                bb.href = item.link || '#';
                bb.target = '_blank';
                bb.rel = 'noopener noreferrer';
                bb.addEventListener('click', e => {
                    e.preventDefault();
                    e.stopPropagation();
                    showDetail(item);
                });

                // 紧凑标题
                const tt = document.createElement('span');
                tt.className = 'event-title-compact';
                tt.textContent = item.title.length > 12 ? item.title.slice(0, 12) + '…' : item.title;
                bb.appendChild(tt);

                bb.title = item.title + '\n' + item.date + ' | ' + item.category + '\n点击查看详情';

                ev.appendChild(bb);
                content.appendChild(ev);
            });

            sl.appendChild(content);
            return sl;
        }

        // 渲染时间刻度
        function renderTimeScale(start, end, dur) {
            const c = document.getElementById('timeScale');
            c.innerHTML = '';

            const months = (end.getFullYear() - start.getFullYear()) * 12 + end.getMonth() - start.getMonth();
            let interval = months > 48 ? 6 : months > 36 ? 3 : months > 18 ? 2 : 1;

            const cur = new Date(start);
            cur.setDate(1);

            while (cur <= end) {
                const pos = ((cur - start) / dur) * 100;
                if (pos >= 0 && pos <= 100) {
                    const m = document.createElement('div');
                    m.className = 'time-marker';
                    m.style.left = pos + '%';

                    const l = document.createElement('div');
                    l.className = 'time-label';
                    l.style.left = pos + '%';
                    l.textContent = cur.getFullYear() + '/' + String(cur.getMonth() + 1).padStart(2, '0');

                    c.appendChild(m);
                    c.appendChild(l);
                }
                cur.setMonth(cur.getMonth() + interval);
            }
        }

        // 创建泳道
        function createSwimlane(label, items, start, dur) {
            const sl = document.createElement('div');
            sl.className = 'swimlane';

            const lb = document.createElement('div');
            lb.className = 'swimlane-label';
            lb.innerHTML = label + '<span class="count">' + items.length + '篇</span>';
            sl.appendChild(lb);

            const content = document.createElement('div');
            content.className = 'swimlane-content';

            // 多行布局算法
            const rows = [];
            const sorted = [...items].sort((a, b) => new Date(a.publish_time) - new Date(b.publish_time));

            sorted.forEach(item => {
                const pos = ((new Date(item.publish_time) - start) / dur) * 100;
                let placed = false;

                for (let i = 0; i < rows.length; i++) {
                    let ok = true;
                    for (const ex of rows[i]) {
                        const ep = ((new Date(ex.publish_time) - start) / dur) * 100;
                        if (Math.abs(pos - ep) < 5) {
                            ok = false;
                            break;
                        }
                    }
                    if (ok) {
                        rows[i].push(item);
                        item.row = i;
                        placed = true;
                        break;
                    }
                }

                if (!placed) {
                    item.row = rows.length;
                    rows.push([item]);
                }
            });

            sl.style.height = Math.max(60, rows.length * 35 + 20) + 'px';

            // 创建事件气泡
            sorted.forEach(item => {
                const pos = ((new Date(item.publish_time) - start) / dur) * 100;

                const ev = document.createElement('div');
                ev.className = 'event-item';
                ev.style.left = pos + '%';
                ev.style.top = (6 + item.row * 35) + 'px';

                const bb = document.createElement('a');
                bb.className = 'event-bubble ' + item.platform;
                bb.href = item.link || '#';
                bb.target = '_blank';
                bb.rel = 'noopener noreferrer';
                bb.addEventListener('click', e => {
                    e.preventDefault();
                    showDetail(item);
                });

                // 分类标签
                const ct = document.createElement('span');
                ct.className = 'category-tag';
                ct.style.background = CAT_COLORS[item.category] || '#888';
                bb.appendChild(ct);

                // 标题
                const tt = document.createElement('span');
                tt.className = 'event-title';
                tt.textContent = item.title.length > 18 ? item.title.slice(0, 18) + '...' : item.title;
                bb.appendChild(tt);

                // 日期
                const dt = document.createElement('span');
                dt.className = 'event-date';
                dt.textContent = item.date;
                bb.appendChild(dt);

                // 链接图标
                if (item.link) {
                    const li = document.createElement('span');
                    li.className = 'link-icon';
                    li.textContent = '🔗';
                    bb.appendChild(li);
                }

                bb.title = item.title + '\n' + item.date + ' | ' + item.category + '\n点击查看详情';

                ev.appendChild(bb);
                content.appendChild(ev);
            });

            sl.appendChild(content);
            return sl;
        }

        // 显示详情弹窗
        function showDetail(item) {
            isModalOpen = true; // 设置弹窗打开状态

            document.getElementById('modalPlatform').className = 'modal-platform ' + item.platform;
            document.getElementById('modalPlatform').textContent = PLATFORMS[item.platform].name;
            document.getElementById('modalTitle').textContent = item.title;
            document.getElementById('modalDate').textContent = '📅 ' + item.date;
            document.getElementById('modalCategory').textContent = '📁 ' + item.category;
            document.getElementById('modalType').textContent = '📄 ' + item.is_original;
            document.getElementById('modalBody').textContent = item.summary || '暂无摘要';

            const link = document.getElementById('modalLink');
            if (item.link && item.link.startsWith('http')) {
                link.href = item.link;
                link.style.display = 'inline-block';
            } else {
                link.style.display = 'none';
            }

            document.getElementById('articleModal').style.display = 'block';
        }

        // 关闭弹窗
        function closeModal() {
            document.getElementById('articleModal').style.display = 'none';
            isModalOpen = false; // 重置弹窗状态
        }

        // 设置事件监听
        function setupEventListeners() {
            // 平台切换
            document.querySelectorAll('.platform-toggle').forEach(btn => {
                btn.addEventListener('click', () => {
                    const p = btn.dataset.platform;
                    btn.classList.toggle('active');
                    if (currentFilters.platforms.has(p)) {
                        currentFilters.platforms.delete(p);
                    } else {
                        currentFilters.platforms.add(p);
                    }
                    renderTimeline();
                });
            });

            // 时间范围
            document.getElementById('timeRange').addEventListener('change', e => {
                currentFilters.timeRange = e.target.value;
                renderTimeline();
            });

            // 视图模式
            document.getElementById('viewMode').addEventListener('change', e => {
                currentFilters.viewMode = e.target.value;
                renderTimeline();
            });

            // 分类筛选
            document.querySelectorAll('.legend-item').forEach(item => {
                item.addEventListener('click', () => {
                    const cat = item.dataset.category;
                    item.classList.toggle('inactive');
                    if (currentFilters.categories.has(cat)) {
                        currentFilters.categories.delete(cat);
                    } else {
                        currentFilters.categories.add(cat);
                    }
                    renderTimeline();
                });
            });

            // 弹窗关闭
            document.getElementById('modalClose').addEventListener('click', closeModal);
            document.getElementById('articleModal').addEventListener('click', e => {
                if (e.target === document.getElementById('articleModal')) {
                    closeModal();
                }
            });
            document.addEventListener('keydown', e => {
                if (e.key === 'Escape') closeModal();
            });
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>

</html>
