                label.className = 'time-label';

                    const hours = Math.floor(minute / 60);
                    const mins = minute % 60;
                    label.textContent = mins === 0 ? `${hours}h` : `${hours}h${mins}m`;

        // 检测两个时间段是否重叠
        function isOverlapping(seg1, seg2, totalDuration) {
            const start1 = (seg1.start_time / totalDuration) * 100;
            const end1 = ((seg1.end_time) / totalDuration) * 100;
            const start2 = (seg2.start_time / totalDuration) * 100;
            const end2 = ((seg2.end_time) / totalDuration) * 100;
            
            // 考虑气泡的最小宽度，增加一些缓冲区
            const buffer = 2; // 2%的缓冲区
            return !(end1 + buffer < start2 || end2 + buffer < start1);
        }
        
        // 为所有泳道安排多行布局
        function arrangeMultiRowLayout(segments, totalDuration) {
            const rows = [];
            const rowHeight = 60; // 每行高度
            
            // 按开始时间排序
            const sortedSegments = [...segments].sort((a, b) => a.start_time - b.start_time);
            
            sortedSegments.forEach(segment => {
                let placed = false;
                
                // 尝试放置在现有行中
                for (let i = 0; i < rows.length; i++) {
                    const row = rows[i];
                    let canPlace = true;
                    
                    // 检查是否与该行中的其他元素重叠
                    for (const existingSegment of row) {
                        if (isOverlapping(segment, existingSegment, totalDuration)) {
                            canPlace = false;
                            break;
                        }
                    }
                    
                    if (canPlace) {
                        row.push(segment);
                        segment.rowIndex = i;
                        placed = true;
                        break;
                    }
                }
                
                // 如果无法放置在现有行中，创建新行
                if (!placed) {
                    const newRow = [segment];
                    segment.rowIndex = rows.length;
                    rows.push(newRow);
                }
            });
            
            return { rows, totalRows: rows.length };
        }

                // 泳道标签
                const label = document.createElement('div');
                label.className = 'swimlane-label';
                label.textContent = type;
                swimlane.appendChild(label);
                
                // 泳道内容
                const content = document.createElement('div');
                content.className = 'swimlane-content';
                
                // 为所有泳道应用多行布局
                const layoutResult = arrangeMultiRowLayout(segmentsByType[type], totalDuration);
                const rowHeight = 60;
                const totalHeight = Math.max(80, layoutResult.totalRows * rowHeight + 20);
                
                // 调整泳道高度
                swimlane.style.height = `${totalHeight}px`;
                
                // 添加该泳道的所有事件
                segmentsByType[type].forEach(segment => {
                    const event = createEvent(segment, totalDuration, segment.rowIndex, rowHeight);
                    content.appendChild(event);
                });
                
                swimlane.appendChild(content);
                container.appendChild(swimlane);
            });
        }

        // 创建单个事件
        function createEvent(segment, totalDuration, rowIndex = null, rowHeight = null) {
            const startPos = (segment.start_time / totalDuration) * 100;
            const width = ((segment.end_time - segment.start_time) / totalDuration) * 100;
            
            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';
            eventItem.style.left = `${startPos}%`;
            eventItem.style.width = `${width}%`;
            
            // 如果是多行布局（演示Demo泳道），设置垂直位置
            if (rowIndex !== null && rowHeight !== null) {
                const topPosition = 10 + (rowIndex * rowHeight);
                eventItem.style.top = `${topPosition}px`;
                eventItem.style.transform = 'none';
            }
            
            // 事件气泡
            const bubble = document.createElement('div');
            bubble.className = 'event-bubble';
            
            // 技术密度指示器
            if (segment.tech_density_score > 0) {
                const density = document.createElement('div');
                density.className = 'tech-density';
                if (segment.tech_density_score >= 0.7) density.classList.add('high');
                else if (segment.tech_density_score >= 0.4) density.classList.add('medium');
                else density.classList.add('low');
                bubble.appendChild(density);
            }
            
            // 演示计数
            if (segment.demo_count > 0) {
                const demoCount = document.createElement('div');
                demoCount.className = 'demo-count';
                demoCount.textContent = `×${segment.demo_count}`;
                bubble.appendChild(demoCount);
            }
            
            // 标题
            const title = document.createElement('span');
            title.className = 'event-title';
            title.textContent = segment.title;
            bubble.appendChild(title);
            
            // 持续时间指示器
            const duration = document.createElement('div');
            duration.className = 'event-duration';
            duration.style.width = '100%';
            eventItem.appendChild(duration);
            
            // 添加悬停时显示详细信息的提示
            bubble.title = `${segment.title}\n时长: ${Math.round((segment.end_time - segment.start_time) / 60)}分钟\n技术密度: ${segment.tech_density_score}\n${segment.content_summary || ''}`;
            
            eventItem.appendChild(bubble);
            return eventItem;
        }

        // 初始化可视化
        async function initializeVisualization(data) {
            const totalDuration = Math.max(...data.map(s => s.end_time));
            
            createStats(data);
            createTimeScale(totalDuration);
            createSwimlanes(data, totalDuration);
        }
        
        // 页面初始化
        async function init() {
            try {
                await loadCompetitorList();
                const data = await parseJsonData();
                const info = (EMBEDDED_DATA[currentCompetitorId] || {}).info;
                if (info) document.getElementById('pageTitle').textContent = info.title;
                await initializeVisualization(data);
            } catch (error) {
                console.error('Initialization error:', error);
                await initializeVisualization(sampleData);
            }
        }

        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
